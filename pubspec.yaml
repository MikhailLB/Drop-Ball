name: drop_ball
description: "DropBall — elemental sphere drop game with levels."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Game ──────────────────────────────────────────────────
  flame: ^1.37.0
  video_player: ^2.11.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  connectivity_plus: 6.1.3

  # ── Gray gate layer ───────────────────────────────────────
  appsflyer_sdk: ^6.16.2
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.6
  firebase_app_check: ^0.3.2+8
  flutter_local_notifications: ^17.2.4
  http: ^1.5.0
  device_info_plus: ^11.5.0
  flutter_secure_storage: ^9.2.4
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.4
  file_picker: ^10.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/Logo_white.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/Logo_white.png"

flutter:
  uses-material-design: true

  assets:
    - assets/game_assets/
    - assets/Loading/
    - assets/NoWifi/
    - assets/Notifications/
    - assets/Logo_white.png
    - assets/Logo_name.png
    - assets/Logo_gray.png
