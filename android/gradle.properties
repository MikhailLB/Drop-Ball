org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.newDsl=false
android.suppressUnsupportedCompileSdk=31

# Disable Kotlin incremental compilation — it breaks when Pub cache (C:) and
# project (E:) are on different drives (RelocatableFileToPathConverter bug).
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
